name: CI / CD

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      PLAYWRIGHT_WEB_SERVER_COMMAND: "npm run start -- --hostname 127.0.0.1 --port 3000"
      AUTH_SECRET: "ci-auth-secret-ci-auth-secret-ci-auth-secret"
      AUTH_URL: "http://127.0.0.1:3000"
      AUTH_GITHUB_ID: "ci-github-id"
      AUTH_GITHUB_SECRET: "ci-github-secret"
      AUTH_GOOGLE_ID: "ci-google-id"
      AUTH_GOOGLE_SECRET: "ci-google-secret"
      DATABASE_URL: "postgresql://ci:ci@127.0.0.1:5432/deepglot?sslmode=require"
      DATABASE_URL_UNPOOLED: "postgresql://ci:ci@127.0.0.1:5432/deepglot?sslmode=require"
      STRIPE_SECRET_KEY: "sk_test_ci"
      STRIPE_WEBHOOK_SECRET: "whsec_ci"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "pk_test_ci"
      STRIPE_PRICE_STARTER_MONTHLY: "price_ci_starter"
      STRIPE_PRICE_PROFESSIONAL_MONTHLY: "price_ci_professional"
      STRIPE_PRICE_ENTERPRISE_MONTHLY: "price_ci_enterprise"
      TRANSLATION_PROVIDER: "mock"
      OPENAI_TRANSLATION_MODEL: "gpt-4o-mini"
      RESEND_API_KEY: "re_ci"
      EMAIL_FROM: "Deepglot <ci@example.com>"
      NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3000"
      NEXT_PUBLIC_APP_NAME: "Deepglot"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Markdown documentation language
        run: npm run check:docs-language

      - name: Run unit tests
        run: npm test

      - name: Build application
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        run: npm run test:e2e

  deploy-preview:
    name: Deploy Preview
    needs: verify
    if: github.event_name == 'push' && github.ref_name != 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: vercel-preview-${{ github.ref_name }}
      cancel-in-progress: true
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Vercel configuration
        run: |
          test -n "$VERCEL_ORG_ID" || { echo "Missing GitHub Actions variable VERCEL_ORG_ID"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "Missing GitHub Actions variable VERCEL_PROJECT_ID"; exit 1; }
          test -n "$VERCEL_TOKEN" || { echo "Missing GitHub Actions secret VERCEL_TOKEN"; exit 1; }

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview environment
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview artifacts
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview build
        id: deploy
        run: |
          deployment_url=$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Summarize preview deployment
        env:
          GIT_BRANCH: ${{ github.ref_name }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          echo "## Preview deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`$GIT_BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    name: Deploy Production
    needs: verify
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: vercel-production
      cancel-in-progress: true
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate Vercel configuration
        run: |
          test -n "$VERCEL_ORG_ID" || { echo "Missing GitHub Actions variable VERCEL_ORG_ID"; exit 1; }
          test -n "$VERCEL_PROJECT_ID" || { echo "Missing GitHub Actions variable VERCEL_PROJECT_ID"; exit 1; }
          test -n "$VERCEL_TOKEN" || { echo "Missing GitHub Actions secret VERCEL_TOKEN"; exit 1; }

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production artifacts
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production build
        id: deploy
        run: |
          deployment_url=$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Summarize production deployment
        env:
          GIT_BRANCH: ${{ github.ref_name }}
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        run: |
          echo "## Production deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: \`$GIT_BRANCH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: $DEPLOYMENT_URL" >> "$GITHUB_STEP_SUMMARY"
